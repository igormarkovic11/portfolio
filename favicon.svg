<svg width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="url(#grad)" rx="80"/>
  
  <!-- Stars -->
  <circle cx="100" cy="100" r="2" fill="white" opacity="0.8"/>
  <circle cx="420" cy="80" r="2" fill="white" opacity="0.7"/>
  <circle cx="380" cy="420" r="2" fill="white" opacity="0.9"/>
  <circle cx="150" cy="400" r="2" fill="white" opacity="0.6"/>
  <circle cx="50" cy="300" r="2" fill="white" opacity="0.8"/>
  <circle cx="450" cy="250" r="2" fill="white" opacity="0.7"/>
  <circle cx="200" cy="150" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="300" cy="100" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="250" cy="450" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="400" cy="300" r="1.5" fill="white" opacity="0.6"/>
  
  <!-- Initials -->
  <text x="256" y="320" font-family="'Space Grotesk', Arial, sans-serif" font-size="280" font-weight="bold" text-anchor="middle" fill="white">IM</text>
</svg>
